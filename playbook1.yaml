  ### Change to your user! ###
#   user: jasonwc
  tasks:
  - name: Print the gateway for each host when defined
    ansible.builtin.debug:
      msg: System {{ inventory_hostname }} has gateway {{ ansible_default_ipv4.gateway }} {{ apt_arch }}