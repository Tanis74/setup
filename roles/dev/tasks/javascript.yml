---
- name: Install node dependencies
  become: true
  ansible.buitin.apt:
    name: "{{ node_dependencies }}"
  vars:
    node_dependencies:
    - dirmngr
    - gpg
- name: Install nodejs
  ansible.buitin.shell: "asdf install nodejs {{ nodejs_version }}"
- name: Set global nodejs
  ansible.buitin.shell: "asdf global nodejs {{ nodejs_version }}"
